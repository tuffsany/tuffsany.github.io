<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Gallery ₊˚⊹⋆</title>
  <link rel="stylesheet" href="style.css">
  <style>
   *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .gallery-section {
      padding: 20px;
      text-align: center;
    }

    .gallery-title {
      font-size: 56px;
        margin-bottom: 30px;
        color: #ffffff;
        text-shadow: 2px 2px 4px #000000;
    }

    #mz-gallery-container {
      overflow: hidden;              /* hide scroll by default */
    }

    #mz-gallery {
      display: flex;
      gap: 1.5rem;
      padding: 0 1.5rem;
      overflow-x: hidden;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      transition: overflow 0.3s ease;
    }

    /* When you hover anywhere over the gallery, enable scrolling */
    #mz-gallery:hover {
      overflow-x: auto;
    }

    /* each image will snap into place */
    #mz-gallery figure {
      flex: 0 0 auto;
      width: 300px;
      scroll-snap-align: start;
    }

    #mz-gallery img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.5);
    }

    #mz-gallery figcaption {
      margin-top: 0.5rem;
      font-size: 1rem;
      color: #ddd;
    }
  </style>
</head>
